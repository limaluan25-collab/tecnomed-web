<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <title>Tecnomed — Relatório de Manutenção</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Bootstrap LOCAL -->
  <link rel="stylesheet" href="libs/bootstrap.min.css">

  <!-- Custom CSS (Restaurado) -->
  <link rel="stylesheet" href="style.css?v=4">

  <!-- jsPDF LOCAL -->
  <script src="libs/jspdf.umd.min.js"></script>
</head>

<body>

  <div id="loadingOverlay">
    <div class="spinner-border text-light" style="width:5rem;height:5rem;"></div>
  </div>

  <div class="card">
    <h1 class="text-center header-title">TECNOMED – Relatório de Manutenção</h1>
    <div class="text-center mb-4"><span class="report-number">Relatório Nº <span id="numRel">0001</span></span></div>

    <form id="formRel">
      <div class="row g-3">

        <div class="col-12">
          <label>Nome do Cliente *</label>
          <input id="nomeCliente" required>
        </div>

        <div class="col-md-6">
          <label>Telefone</label>
          <input id="telefone">
        </div>

        <div class="col-md-6">
          <label>Email *</label>
          <input id="emailCliente" type="email" required>
        </div>

        <div class="col-md-6">
          <label>Responsável *</label>
          <input id="responsavel" required>
        </div>

        <div class="col-md-6">
          <label>Solicitante</label>
          <input id="solicitante">
        </div>

        <div class="col-12">
          <label>Equipamento</label>
          <input id="equipamento">
        </div>

        <div class="col-md-8">
          <label>Endereço</label>
          <input id="endereco">
        </div>

        <div class="col-md-3">
          <label>Cidade</label>
          <input id="cidade">
        </div>

        <div class="col-md-1">
          <label>UF</label>
          <input id="estado" maxlength="2">
        </div>

        <div class="col-12">
          <label>Descrição do Defeito *</label>
          <textarea id="defeito" required></textarea>
        </div>

        <div class="col-md-4">
          <label>Tipo de Serviço *</label>
          <select id="tipoServico" required>
            <option>Preventiva</option>
            <option>Corretiva</option>
          </select>
        </div>

        <div class="col-12">
          <label>Serviço Executado *</label>
          <textarea id="descricao" required></textarea>
        </div>

        <div class="col-md-4">
          <label>Data *</label>
          <input id="dataInicio" type="date" required>
        </div>

        <div class="col-md-4">
          <label>Hora Início *</label>
          <input id="horaInicio" type="time" required>
        </div>

        <div class="col-md-4">
          <label>Hora Término *</label>
          <input id="horaFim" type="time" required>
        </div>

        <div class="col-md-6">
          <label>Técnico *</label>
          <input id="techName" required>
        </div>

        <div class="col-md-6">
          <label>Materiais Utilizados</label>
          <textarea id="materiais"></textarea>
        </div>

        <div class="col-12">
          <label>Observações</label>
          <textarea id="observacoes"></textarea>
        </div>

        <div class="col-12">
          <label>Fotos</label>
          <input type="file" id="fotos" class="form-control" multiple accept="image/*">
          <div id="fotosPreview" class="fotos-preview mt-2"></div>
        </div>

        <div class="col-12">
          <label>Assinatura do Cliente *</label>
          <div class="sig-area">
            <canvas id="sigCanvas" class="sig-canvas"></canvas>
            <div id="sigInfo" class="sig-info">Toque e arraste para assinar</div>
          </div>
        </div>

        <div class="col-12 actions">
          <button type="button" id="btnLimpar" class="btn btn-outline-danger">Limpar</button>
          <button type="button" id="btnPDF" class="btn btn-primary">Ver PDF</button>
          <button type="button" id="btnWhatsapp" class="btn btn-success"
            style="background: #25D366; border:none;">WhatsApp</button>
          <button type="button" id="btnEnviar" class="btn btn-success">Finalizar</button>
        </div>

      </div>
    </form>

    <div id="alertContainer" class="mt-3"></div>
  </div>

  <script>
    /* ================= CONFIG ================= */
    const SERVER_URL = `/api/upload`;

    // Gerar ID baseado em data (PWA style)
    function generateID() {
      const now = new Date();
      return now.getFullYear().toString() +
        (now.getMonth() + 1).toString().padStart(2, '0') +
        now.getDate().toString().padStart(2, '0') + "-" +
        now.getHours().toString().padStart(2, '0') +
        now.getMinutes().toString().padStart(2, '0');
    }

    let contador = localStorage.getItem("contadorRel") || generateID();
    document.getElementById("numRel").innerText = contador;

    if (!document.getElementById("dataInicio").value) {
      document.getElementById("dataInicio").value = new Date().toISOString().split("T")[0];
    }

    /* ================= ASSINATURA (FIXED & PERSISTENT) ================= */
    const canvas = document.getElementById("sigCanvas");
    const ctx = canvas.getContext("2d");
    const sigInfo = document.getElementById("sigInfo");
    const storageKey = 'sig_backup_main';
    const ratio = window.devicePixelRatio || 1;
    let drawing = false;
    let hasSignature = false;

    function saveToStorage() {
      localStorage.setItem(storageKey, canvas.toDataURL());
    }

    function loadFromStorage() {
      const data = localStorage.getItem(storageKey);
      if (data) {
        const img = new Image();
        img.src = data;
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.offsetWidth, canvas.offsetHeight);
          hasSignature = true;
          sigInfo.textContent = "Assinatura registrada";
          sigInfo.classList.add("signed");
        };
      }
    }

    function resize() {
      const data = canvas.toDataURL();
      canvas.width = canvas.offsetWidth * ratio;
      canvas.height = canvas.offsetHeight * ratio;
      ctx.scale(ratio, ratio);
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#000";

      const img = new Image();
      const storedData = localStorage.getItem(storageKey);
      img.src = data.length > 2000 ? data : (storedData || "");
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.offsetWidth, canvas.offsetHeight);
      };
    }

    window.addEventListener("resize", resize);
    window.addEventListener("pageshow", loadFromStorage);
    setTimeout(resize, 100);

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(e) {
      if (e.target !== canvas) return;
      e.preventDefault();
      drawing = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      hasSignature = true;
      sigInfo.textContent = "Assinatura registrada";
      sigInfo.classList.add("signed");
    }

    function move(e) {
      if (!drawing) return;
      e.preventDefault();
      const pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function stop() {
      if (drawing) {
        drawing = false;
        saveToStorage();
      }
    }

    canvas.addEventListener("touchstart", start, { passive: false });
    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("touchmove", move, { passive: false });
    canvas.addEventListener("mousemove", move);
    window.addEventListener("touchend", stop);
    window.addEventListener("mouseup", stop);

    document.getElementById("btnLimpar").onclick = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      localStorage.removeItem(storageKey);
      hasSignature = false;
      sigInfo.textContent = "Toque e arraste para assinar";
      sigInfo.classList.remove("signed");
    };

    /* ================= FOTOS ================= */
    const fotosInput = document.getElementById("fotos");
    const fotosPreview = document.getElementById("fotosPreview");
    let photosList = [];
    const MAX_PHOTOS = 10;

    function renderPhotos() {
      fotosPreview.innerHTML = "";
      photosList.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const div = document.createElement("div");
          div.className = "photo-item";
          const img = document.createElement("img");
          img.src = e.target.result;
          const btnRemove = document.createElement("button");
          btnRemove.innerHTML = "&times;";
          btnRemove.className = "remove-btn";
          btnRemove.style = "position:absolute;top:-5px;right:-5px;background:red;color:white;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;";
          btnRemove.onclick = () => { photosList.splice(index, 1); renderPhotos(); };
          div.appendChild(img);
          div.appendChild(btnRemove);
          fotosPreview.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
      fotosInput.disabled = (photosList.length >= MAX_PHOTOS);
    }

    fotosInput.addEventListener("change", function () {
      if (this.files) {
        Array.from(this.files).forEach(f => {
          if (photosList.length < MAX_PHOTOS) photosList.push(f);
        });
        renderPhotos();
        this.value = "";
      }
    });

    /* ================= PDF (REFINED PROFESSIONAL LAYOUT) ================= */
    async function gerarPDF() {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();

      const azul = [0, 86, 179];
      const cinzaClaro = [245, 245, 245];

      // Cabeçalho Profissional
      pdf.setFillColor(...azul);
      pdf.rect(0, 0, 210, 40, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(22);
      pdf.setFont("helvetica", "bold");
      pdf.text("TECNOMED", 15, 20);
      pdf.setFontSize(10);
      pdf.setFont("helvetica", "normal");
      pdf.text("ASSISTÊNCIA TÉCNICA E MANUTENÇÃO", 15, 28);
      pdf.text("Serviços Especializados em Equipamentos Odontológicos", 15, 33);
      pdf.setFontSize(12);
      pdf.text(`RELATÓRIO Nº ${contador}`, 155, 25);

      let y = 50;

      function drawSection(title) {
        if (y > 260) { pdf.addPage(); y = 20; }
        pdf.setFillColor(...cinzaClaro);
        pdf.rect(10, y, 190, 8, 'F');
        pdf.setTextColor(0, 0, 0);
        pdf.setFontSize(10);
        pdf.setFont("helvetica", "bold");
        pdf.text(title.toUpperCase(), 14, y + 6);
        y += 12;
      }

      function drawField(label, value, xOffset = 15, width = 180) {
        if (y > 280) { pdf.addPage(); y = 20; }
        pdf.setFontSize(9);
        pdf.setFont("helvetica", "bold");
        const labelText = `${label}: `;
        pdf.text(labelText, xOffset, y);

        pdf.setFont("helvetica", "normal");
        const labelWidth = pdf.getTextWidth(labelText);
        const valStr = String(value || "-");
        const splitVal = pdf.splitTextToSize(valStr, width - labelWidth);

        pdf.text(splitVal, xOffset + labelWidth, y);
        y += (splitVal.length * 5) + 3; // Incremento automático
      }

      drawSection("Dados do Cliente");
      drawField("Cliente", document.getElementById("nomeCliente").value);
      drawField("Email", document.getElementById("emailCliente").value);
      drawField("Telefone", document.getElementById("telefone").value);
      drawField("Endereço", `${document.getElementById("endereco").value} - ${document.getElementById("cidade").value}/${document.getElementById("estado").value}`);
      y += 2;

      drawSection("Informações do Serviço");
      drawField("Equipamento", document.getElementById("equipamento").value);
      drawField("Responsável", document.getElementById("responsavel").value);
      drawField("Tipo de Manutenção", document.getElementById("tipoServico").value);
      drawField("Solicitante", document.getElementById("solicitante").value);
      y += 2;

      drawSection("Relatório Técnico");
      pdf.setFontSize(10);
      pdf.setFont("helvetica", "bold");
      pdf.text("Descrição do Serviço:", 15, y);
      y += 6;
      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(9);
      const descLines = pdf.splitTextToSize(document.getElementById("descricao").value, 180);
      pdf.text(descLines, 15, y);
      y += (descLines.length * 5) + 6;

      if (document.getElementById("defeito").value) {
        drawField("Defeito", document.getElementById("defeito").value);
      }
      if (document.getElementById("materiais").value) {
        drawField("Materiais", document.getElementById("materiais").value);
      }
      if (document.getElementById("observacoes").value) {
        drawField("Observações", document.getElementById("observacoes").value);
      }
      y += 5;

      drawSection("Horários e Execução");
      pdf.text(`Data: ${document.getElementById("dataInicio").value.split('-').reverse().join('/')}`, 15, y);
      pdf.text(`Início: ${document.getElementById("horaInicio").value}`, 80, y);
      pdf.text(`Término: ${document.getElementById("horaFim").value}`, 140, y);
      y += 8;
      pdf.text(`Técnico Responsável: ${document.getElementById("techName").value}`, 15, y);

      // Assinatura
      if (hasSignature) {
        y += 15;
        if (y > 230) { pdf.addPage(); y = 20; }
        pdf.setFont("helvetica", "bold");
        pdf.text("ASSINATURA DO CLIENTE", 105, y, { align: "center" });
        y += 5;
        try {
          const imgData = canvas.toDataURL("image/png");
          pdf.addImage(imgData, 'PNG', 65, y, 80, 25);
          y += 28;
          pdf.line(60, y, 150, y);
          y += 5;
          pdf.setFontSize(8);
          pdf.setFont("helvetica", "normal");
          pdf.text("Declaro que o serviço acima foi executado e testado em minha presença.", 105, y, { align: "center" });
        } catch (e) { }
      }

      // Fotos
      if (photosList.length > 0) {
        pdf.addPage();
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(14);
        pdf.text("ANEXOS FOTOGRÁFICOS", 105, 15, { align: "center" });
        let yPos = 25;
        for (let file of photosList) {
          const imgData = await new Promise(r => {
            const rd = new FileReader();
            rd.onload = () => r(rd.result);
            rd.readAsDataURL(file);
          });
          if (yPos + 80 > pageHeight - 15) { pdf.addPage(); yPos = 20; }
          pdf.addImage(imgData, "JPEG", 25, yPos, 160, 80);
          yPos += 90;
        }
      }

      // Footer
      const pageCount = pdf.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        pdf.setPage(i);
        pdf.setFontSize(8);
        pdf.setTextColor(150);
        pdf.text("TECNOMED - Assistência Técnica - Relatório Digital Gerado via Tecnomed Web", 105, 290, { align: "center" });
      }

      return pdf.output("blob");
    }

    /* ================= AÇÕES ================= */
    document.getElementById("btnPDF").onclick = async () => {
      const blob = await gerarPDF();
      window.open(URL.createObjectURL(blob));
    };

    document.getElementById("btnWhatsapp").onclick = async () => {
      if (!hasSignature) { alert("Assine antes de compartilhar."); return; }
      const loading = document.getElementById("loadingOverlay");
      loading.classList.add("show");
      try {
        const blob = await gerarPDF();
        const file = new File([blob], `Relatorio_${contador}.pdf`, { type: "application/pdf" });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'Relatório Tecnomed' });
        } else {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `Relatorio_${contador}.pdf`;
          a.click();
        }
      } catch (err) { } finally { loading.classList.remove("show"); }
    };

    document.getElementById("btnEnviar").onclick = async () => {
      if (!document.getElementById("formRel").checkValidity()) { document.getElementById("formRel").reportValidity(); return; }
      if (!hasSignature) { alert("Assinatura obrigatória"); return; }

      const loading = document.getElementById("loadingOverlay");
      loading.classList.add("show");

      try {
        const formData = new FormData();
        const inputs = document.querySelectorAll("input, textarea, select");
        inputs.forEach(el => { if (el.id && el.id !== "fotos") formData.append(el.id, el.value); });

        const pdfBlob = await gerarPDF();
        formData.append("relatorio", pdfBlob, `Relatorio_${contador}.pdf`);

        const res = await fetch(SERVER_URL, { method: "POST", body: formData });
        if (!res.ok) throw new Error("Erro no servidor");

        alert("Sucesso! Relatório enviado agora.");
        localStorage.removeItem(storageKey);
        location.reload();
      } catch (err) {
        alert("Erro no envio: " + err.message);
      } finally { loading.classList.remove("show"); }
    };

  </script>
</body>

</html>
