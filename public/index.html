<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tecnomed — Relatório de Manutenção Odontológica</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --primary: #0056b3;
      --secondary: #6c757d;
      --success: #28a745;
      --bg: #f8f9fa;
      --text: #333;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .main-card {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 30px;
      border-top: 6px solid var(--primary);
    }

    .header-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #eee;
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .header-title h2 {
      margin: 0;
      color: var(--primary);
      font-size: 1.5rem;
      font-weight: 700;
    }

    .rel-number {
      background: var(--primary);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    label {
      font-weight: 600;
      margin-bottom: 5px;
      display: block;
      font-size: 0.85rem;
      color: #555;
    }

    .form-control,
    .form-select {
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
    }

    .sig-container {
      background: #fafafa;
      border: 2px dashed #ddd;
      border-radius: 8px;
      margin-top: 10px;
      position: relative;
    }

    .sig-canvas {
      height: 160px;
      width: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: var(--primary);
      border: none;
    }

    .btn-success {
      background: var(--success);
      border: none;
    }

    .btn-outline-secondary {
      color: var(--secondary);
      border: 1px solid var(--secondary);
    }

    .actions-bar {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    @media (max-width: 600px) {
      .actions-bar {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="main-card">

    <div class="header-title">
      <div>
        <h2>TECNOMED</h2>
        <small class="text-muted">Assistência Técnica e Manutenção</small>
      </div>
      <div class="rel-number">Nº <span id="numRel">0001</span></div>
    </div>

    <form id="formRel">
      <div class="row g-3">

        <div class="col-md-6">
          <label>Cliente / Consultório *</label>
          <input class="form-control" id="nomeCliente" placeholder="Nome completo" required>
        </div>

        <div class="col-md-3">
          <label>Telefone</label>
          <input class="form-control" id="telefone" placeholder="(00) 00000-0000">
        </div>

        <div class="col-md-3">
          <label>E-mail do Cliente *</label>
          <input class="form-control" id="emailCliente" type="email" placeholder="cliente@email.com" required>
        </div>

        <hr class="my-4">

        <div class="col-md-4">
          <label>Equipamento</label>
          <input class="form-control" id="equipamento" placeholder="Ex: Autoclave CRISTOFOLI">
        </div>

        <div class="col-md-4">
          <label>Responsável / Solicitante</label>
          <input class="form-control" id="responsavel" placeholder="Quem solicitou o serviço">
        </div>

        <div class="col-md-4">
          <label>Tipo de Manutenção</label>
          <select class="form-select" id="tipoServico">
            <option value="Corretiva">🔧 Corretiva</option>
            <option value="Preventiva">🛡️ Preventiva</option>
            <option value="Instalação">📦 Instalação</option>
          </select>
        </div>

        <div class="col-12">
          <label>Defeito Reclamado</label>
          <textarea class="form-control" id="defeito" rows="2"></textarea>
        </div>

        <div class="col-12">
          <label>Serviço Executado / Relatório Técnico *</label>
          <textarea class="form-control" id="descricao" rows="4" placeholder="Descreva os procedimentos realizados..."
            required></textarea>
        </div>

        <div class="col-md-12">
          <label>Peças / Materiais Utilizados</label>
          <textarea class="form-control" id="materiais" rows="2"></textarea>
        </div>

        <div class="col-md-4">
          <label>Data</label>
          <input class="form-control" id="dataInicio" type="date" required>
        </div>

        <div class="col-md-4">
          <label>Horário Início</label>
          <input class="form-control" id="horaInicio" type="time" required>
        </div>

        <div class="col-md-4">
          <label>Horário Término</label>
          <input class="form-control" id="horaFim" type="time" required>
        </div>

        <div class="col-md-12">
          <label>Técnico Responsável</label>
          <input class="form-control" id="techName" value="Técnico Tecnomed" required>
        </div>

        <div class="col-12 mt-4">
          <label>Assinatura do Cliente *</label>
          <div class="sig-container">
            <canvas id="sigCliente" class="sig-canvas"></canvas>
          </div>
          <button type="button" id="clearCliente" class="btn btn-link btn-sm text-danger p-0 mt-1">Apagar
            Assinatura</button>
        </div>

        <div class="actions-bar">
          <button type="button" id="btnGerarPDF" class="btn btn-outline-secondary">Visualizar PDF</button>
          <button type="button" id="btnFinalizar" class="btn btn-success flex-grow-1">Finalizar e Enviar por
            E-mail</button>
        </div>

      </div>
    </form>
  </div>

  <script>
    // URL alterada para funcionar com a estrutura da Vercel
    const SERVER_URL = "/api/upload";

    // Gerar ID baseado em data se não houver contador (padrão tecnomed-web)
    function generateID() {
      const now = new Date();
      return now.getFullYear().toString() +
        (now.getMonth() + 1).toString().padStart(2, '0') +
        now.getDate().toString().padStart(2, '0') + "-" +
        now.getHours().toString().padStart(2, '0') +
        now.getMinutes().toString().padStart(2, '0');
    }

    let contador = localStorage.getItem("contadorRel") || generateID();
    document.getElementById("numRel").innerText = contador;

    if (!document.getElementById("dataInicio").value) {
      document.getElementById("dataInicio").value = new Date().toISOString().split("T")[0];
    }

    // ---------- CANVAS ----------
    function makeCanvas(id) {
      const c = document.getElementById(id);
      const ctx = c.getContext("2d");
      const storageKey = `sig_backup_${id}`;

      const ratio = window.devicePixelRatio || 1;

      function saveToStorage() {
        localStorage.setItem(storageKey, c.toDataURL());
      }

      function loadFromStorage() {
        const data = localStorage.getItem(storageKey);
        if (data) {
          const img = new Image();
          img.src = data;
          img.onload = () => {
            ctx.clearRect(0, 0, c.width, c.height);
            ctx.drawImage(img, 0, 0, c.offsetWidth, c.offsetHeight);
          };
        }
      }

      function resize() {
        const data = c.toDataURL();
        c.width = c.offsetWidth * ratio;
        c.height = c.offsetHeight * ratio;
        ctx.scale(ratio, ratio);

        ctx.lineWidth = 2;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000";

        const img = new Image();
        const storedData = localStorage.getItem(storageKey);
        img.src = data.length > 2000 ? data : (storedData || "");
        img.onload = () => ctx.drawImage(img, 0, 0, c.offsetWidth, c.offsetHeight);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("pageshow", loadFromStorage);
      setTimeout(resize, 100);

      let drawing = false;

      function getPos(e) {
        const rect = c.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      function start(e) {
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        if (e.touches) e.preventDefault();
      }

      function move(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        if (e.touches) e.preventDefault();
      }

      function stop() {
        if (drawing) {
          drawing = false;
          saveToStorage();
        }
      }

      c.addEventListener("mousedown", start);
      c.addEventListener("mousemove", move);
      window.addEventListener("mouseup", stop);

      c.addEventListener("touchstart", start, { passive: false });
      c.addEventListener("touchmove", move, { passive: false });
      window.addEventListener("touchend", stop);

      return {
        clear: () => {
          ctx.clearRect(0, 0, c.width, c.height);
          localStorage.removeItem(storageKey);
        },
        isBlank: () => {
          const buffer = new Uint32Array(ctx.getImageData(0, 0, c.width, c.height).data.buffer);
          return !buffer.some(color => color !== 0);
        },
        data: () => {
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = c.offsetWidth;
          tempCanvas.height = c.offsetHeight;
          const tempCtx = tempCanvas.getContext('2d');
          tempCtx.drawImage(c, 0, 0, c.width, c.height, 0, 0, c.offsetWidth, c.offsetHeight);
          return tempCanvas.toDataURL();
        }
      };
    }
    const sigCliente = makeCanvas("sigCliente");
    clearCliente.onclick = () => sigCliente.clear();

    // ---------- BUILD ----------
    function buildRel() {
      if (sigCliente.isBlank()) { alert("Assinatura obrigatória"); return null; }
      return {
        id: contador,
        cliente: nomeCliente.value,
        emailCliente: emailCliente.value,
        telefone: telefone.value,
        responsavel: responsavel.value,
        equipamento: equipamento.value,
        tipoServico: tipoServico.value,
        defeito: defeito.value,
        descricao: descricao.value,
        materiais: materiais.value,
        data: dataInicio.value,
        horaInicio: horaInicio.value,
        horaFim: horaFim.value,
        tecnico: techName.value,
        assinaturaCliente: sigCliente.data()
      }
    }

    // ---------- PDF ----------
    async function gerarPDFBlob(rel) {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      const azul = [0, 86, 179];
      const cinzaClaro = [245, 245, 245];

      pdf.setFillColor(...azul);
      pdf.rect(0, 0, 210, 40, 'F');

      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(22);
      pdf.setFont("helvetica", "bold");
      pdf.text("TECNOMED", 15, 20);

      pdf.setFontSize(10);
      pdf.setFont("helvetica", "normal");
      pdf.text("ASSISTÊNCIA TÉCNICA E MANUTENÇÃO", 15, 28);
      pdf.text("Serviços Especializados em Equipamentos Odontológicos", 15, 33);

      pdf.setFontSize(12);
      pdf.text(`RELATÓRIO Nº ${rel.id}`, 155, 25);

      let y = 50;

      function drawSection(title) {
        pdf.setFillColor(...cinzaClaro);
        pdf.rect(10, y, 190, 8, 'F');
        pdf.setTextColor(0, 0, 0);
        pdf.setFontSize(10);
        pdf.setFont("helvetica", "bold");
        pdf.text(title.toUpperCase(), 14, y + 6);
        y += 12;
      }

      function drawField(label, value, xOffset = 10) {
        pdf.setFontSize(9);
        pdf.setFont("helvetica", "bold");
        pdf.text(`${label}:`, xOffset, y);
        pdf.setFont("helvetica", "normal");
        pdf.text(String(value || "-"), xOffset + pdf.getTextWidth(`${label}: `), y);
      }

      drawSection("Dados do Cliente");
      drawField("Cliente", rel.cliente);
      y += 7;
      drawField("E-mail", rel.emailCliente);
      y += 7;
      drawField("Telefone", rel.telefone);
      y += 12;

      drawSection("Informações do Serviço");
      drawField("Equipamento", rel.equipamento);
      y += 7;
      drawField("Responsável", rel.responsavel);
      y += 7;
      drawField("Tipo de Manutenção", rel.tipoServico);
      y += 12;

      drawSection("Relatório Técnico");
      pdf.setFontSize(9);
      pdf.setFont("helvetica", "normal");
      const descLines = pdf.splitTextToSize(rel.descricao, 180);
      pdf.text(descLines, 14, y);
      y += (descLines.length * 5) + 8;

      if (rel.materiais) {
        pdf.setFont("helvetica", "bold");
        pdf.text("Peças / Materiais:", 14, y);
        y += 5;
        pdf.setFont("helvetica", "normal");
        pdf.text(rel.materiais, 14, y);
        y += 10;
      }

      drawSection("Horários e Execução");
      pdf.setFontSize(9);
      pdf.text(`Data: ${rel.data.split('-').reverse().join('/')}`, 14, y);
      pdf.text(`Início: ${rel.horaInicio}`, 80, y);
      pdf.text(`Término: ${rel.horaFim}`, 140, y);
      y += 8;
      pdf.text(`Técnico Responsável: ${rel.tecnico}`, 14, y);
      y += 15;

      if (rel.assinaturaCliente) {
        if (y > 230) pdf.addPage(), y = 20;
        pdf.setFont("helvetica", "bold");
        pdf.text("ASSINATURA DO CLIENTE", 105, y, { align: "center" });
        y += 5;
        pdf.addImage(rel.assinaturaCliente, "PNG", 65, y, 80, 25);
        y += 28;
        pdf.line(60, y, 150, y);
        y += 5;
        pdf.setFontSize(8);
        pdf.setFont("helvetica", "normal");
        pdf.text("Declaro que o serviço acima foi executado e testado em minha presença.", 105, y, { align: "center" });
      }

      const pageCount = pdf.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        pdf.setPage(i);
        pdf.setFontSize(8);
        pdf.setTextColor(150);
        pdf.text("TECNOMED - Assistência Técnica - Gerado de forma digital", 105, 290, { align: "center" });
      }

      return pdf.output("blob");
    }

    btnGerarPDF.onclick = async () => {
      const r = buildRel(); if (!r) return;
      const blob = await gerarPDFBlob(r);
      const url = URL.createObjectURL(blob);
      window.open(url);
    };

    btnFinalizar.onclick = async () => {
      const r = buildRel(); if (!r) return;
      const blob = await gerarPDFBlob(r);
      const fd = new FormData();
      fd.append("relatorio", blob, `Relatorio_${r.id}.pdf`);
      fd.append("nomeCliente", r.cliente);
      fd.append("emailCliente", r.emailCliente);

      const res = await fetch(SERVER_URL, { method: "POST", body: fd });
      if (!res.ok) { alert("Falha no envio"); return; }

      alert("Relatório enviado com sucesso!");
      localStorage.removeItem("contadorRel");
      location.reload();
    };
  </script>
</body>

</html>
